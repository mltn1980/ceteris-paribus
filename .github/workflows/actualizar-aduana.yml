name: 🛃 Generar Informe Comercio Exterior

# Se dispara cuando el JSON de datos se actualiza (vía fetch-aduana.ps1 local)
# o manualmente desde GitHub Actions
on:
  push:
    paths:
      - 'data/comercio-exterior.json'
  workflow_dispatch:

# NOTA: El fetch de datos corre localmente con fetch-aduana.ps1 (Windows/PowerShell)
# porque biestadisticas.aduanas.gub.uy solo acepta conexiones desde Uruguay.
# Este workflow solo genera el HTML a partir del JSON ya commiteado.

jobs:
  generar-html:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generar informe HTML
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/generar-aduana-html.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "ceterisparibus-bot"
          git config user.email "bot@ceterisparibus.uy"
          git add comercio-exterior.html
          if git diff --cached --quiet; then
            echo "Sin cambios en el HTML."
          else
            FECHA=$(date +'%d/%m/%Y %H:%M UTC')
            git commit -m "🛃 Comercio exterior: HTML generado ${FECHA}"
            git push
            echo "✅ HTML pusheado al repo."
          fi
