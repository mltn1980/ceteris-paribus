name: 🛃 Actualizar Comercio Exterior

on:
  schedule:
    # 1ro de cada mes a las 9:00am Uruguay (UTC-3 = 12:00 UTC)
    - cron: '0 12 1 * *'
  workflow_dispatch:
    inputs:
      anos:
        description: 'Años a procesar (ej: 2025,2026). Vacío = todos desde 2020'
        required: false
        default: ''
      forzar:
        description: 'Forzar reescritura aunque no haya cambios'
        required: false
        default: 'false'

jobs:
  actualizar-aduana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests urllib3

      - name: Correr fetch-aduana
        env:
          ANOS: ${{ github.event.inputs.anos || '' }}
          FORZAR: ${{ github.event.inputs.forzar || 'false' }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch-aduana.py
        timeout-minutes: 90

      - name: Generar informe HTML
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/generar-aduana-html.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "ceterisparibus-bot"
          git config user.email "bot@ceterisparibus.uy"
          git add data/comercio-exterior.json data/aduana-rubros.json comercio-exterior.html
          if git diff --cached --quiet; then
            echo "Sin cambios — no se hace commit."
          else
            FECHA=$(date +'%d/%m/%Y %H:%M UTC')
            git commit -m "🛃 Comercio exterior: actualización automática ${FECHA}"
            git push
            echo "✅ HTML y datos pusheados al repo."
          fi
