name: 🐂 Actualizar Novillo Tipo 2.0

on:
  schedule:
    # Cada 2 días a las 10:17am Uruguay (UTC-3 = 13:17 UTC)
    - cron: '17 13 */2 * *'
  workflow_dispatch:
    inputs:
      forzar:
        description: 'Forzar actualización aunque no haya datos nuevos'
        required: false
        default: 'false'

jobs:
  actualizar-novillo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests xlrd openpyxl

      - name: Correr actualizador Novillo Tipo
        env:
          FORZAR: ${{ github.event.inputs.forzar || 'false' }}
        run: python scripts/actualizar-novillo.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "ceterisparibus-bot"
          git config user.email "bot@ceterisparibus.uy"
          git add data/novillo.json data/novillo-tipo-serie.json
          if git diff --cached --quiet; then
            echo "Sin cambios — no se hace commit."
          else
            FECHA=$(date +'%d/%m/%Y %H:%M UTC')
            git commit -m "🐂 Novillo Tipo: actualización automática ${FECHA}"
            git push
            echo "✅ Cambios pusheados. Netlify desplegará automáticamente."
          fi
