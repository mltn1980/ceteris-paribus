<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolución RHE 2023-2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { 
            font-size: 1.5rem; 
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .subtitle {
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 24px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .stat-change {
            font-size: 0.875rem;
            margin-top: 4px;
        }
        .positive { color: #2a7235; }
        .negative { color: #c41e3a; }
        canvas {
            max-height: 400px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Evolución Relación Hacienda/Exportación (RHE)</h1>
        <div class="subtitle">Serie histórica 2023-2026 · Datos INAC</div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">RHE Novillo Actual</div>
                <div class="stat-value" id="rhe-nov-actual">—</div>
                <div class="stat-change" id="rhe-nov-change">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">RHE Vaca Actual</div>
                <div class="stat-value" id="rhe-vaca-actual">—</div>
                <div class="stat-change" id="rhe-vaca-change">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Promedio 2023-2026</div>
                <div class="stat-value" id="rhe-avg">—</div>
                <div class="stat-change" style="color: #666;">Novillo</div>
            </div>
        </div>
        
        <canvas id="rheChart"></canvas>
    </div>
    
    <script>
    fetch('data/rhe-serie.json')
        .then(r => r.json())
        .then(data => {
            // Stats
            const ultimo = data[data.length - 1];
            const primero2026 = data.find(d => d.fecha.startsWith('2026'));
            const avg = data.reduce((sum, d) => sum + d.rhe_novillo, 0) / data.length;
            
            document.getElementById('rhe-nov-actual').textContent = (ultimo.rhe_novillo * 100).toFixed(1) + '%';
            document.getElementById('rhe-vaca-actual').textContent = (ultimo.rhe_vaca * 100).toFixed(1) + '%';
            document.getElementById('rhe-avg').textContent = (avg * 100).toFixed(1) + '%';
            
            const cambioNov = ((ultimo.rhe_novillo - primero2026.rhe_novillo) * 100).toFixed(1);
            const cambioVaca = ((ultimo.rhe_vaca - primero2026.rhe_vaca) * 100).toFixed(1);
            
            document.getElementById('rhe-nov-change').innerHTML = 
                `<span class="${cambioNov >= 0 ? 'positive' : 'negative'}">${cambioNov >= 0 ? '▲' : '▼'} ${Math.abs(cambioNov)}pp desde ene 2026</span>`;
            document.getElementById('rhe-vaca-change').innerHTML = 
                `<span class="${cambioVaca >= 0 ? 'positive' : 'negative'}">${cambioVaca >= 0 ? '▲' : '▼'} ${Math.abs(cambioVaca)}pp desde ene 2026</span>`;
            
            // Chart
            const ctx = document.getElementById('rheChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.fecha),
                    datasets: [
                        {
                            label: 'RHE Novillo',
                            data: data.map(d => d.rhe_novillo * 100),
                            borderColor: '#c41e3a',
                            backgroundColor: 'rgba(196, 30, 58, 0.1)',
                            borderWidth: 2,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5
                        },
                        {
                            label: 'RHE Vaca',
                            data: data.map(d => d.rhe_vaca * 100),
                            borderColor: '#1a5490',
                            backgroundColor: 'rgba(26, 84, 144, 0.1)',
                            borderWidth: 2,
                            tension: 0.3,
                            pointRadius: 0,
                            pointHoverRadius: 5
                        },
                        {
                            label: 'Referencia 100%',
                            data: data.map(() => 100),
                            borderColor: '#666',
                            borderWidth: 1,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if (context.datasetIndex === 2) return null;
                                    return context.dataset.label + ': ' + context.parsed.y.toFixed(1) + '%';
                                },
                                title: function(context) {
                                    const date = new Date(context[0].label);
                                    return date.toLocaleDateString('es-UY', { year: 'numeric', month: 'short', day: 'numeric' });
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'month',
                                displayFormats: {
                                    month: 'MMM yyyy'
                                }
                            },
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'RHE (%)'
                            },
                            beginAtZero: false,
                            min: 80,
                            max: 120,
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        }
                    }
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</body>
</html>
